services:
  mysql:
    image: mysql:5.7
    container_name: mysql
    environment:
      MYSQL_USER: admin
      MYSQL_PASSWORD: admin
      MYSQL_ROOT_PASSWORD: admin
      MYSQL_DATABASE: tws_db
    volumes:
      - ./mysql_data_compose:/var/lib/mysql
    networks:
      - 2-tier
    ports:
      - "3306:3306"


    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin" ]
      interval: 10s
      retries: 5
      start_period: 60s
      timeout: 5s


  flaskapp:
    build:
      context: .
    container_name: flask-app
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: admin
      MYSQL_DB: tws_db
    networks:
      - 2-tier
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    restart: always



networks:
  2-tier:


volumes:
  mysql_data:
